[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options — coverage gate uses .coveragerc (core ≥70%, scoped omits)
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=core
    --cov-config=.coveragerc
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=70
    --disable-warnings

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may use database/APIs)
    slow: Slow tests (may take >1 second)
    performance: Performance/benchmark tests

# Coverage: see .coveragerc (single source of truth)

