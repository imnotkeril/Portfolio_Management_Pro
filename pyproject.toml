[tool.black]
line-length = 88
target-version = ["py39"]
extend-exclude = "/(migrations|node_modules)/"

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["api", "config", "core", "database", "models", "services", "streamlit_app"]
skip = ["database/migrations"]
skip_glob = ["**/node_modules/**", "**/frontend/node_modules/**"]

[tool.ruff]
line-length = 88
target-version = "py39"
extend-exclude = ["database/migrations", "node_modules", "frontend/node_modules"]

# Import order: isort (see [tool.isort]). Ruff "I" rules removed to avoid conflicts.
[tool.ruff.lint]
select = ["E", "F", "W", "N", "UP"]
# N806: ML/math convention (X_train, Sigma); N818: WMCBaseException is established API
ignore = ["E501", "N806", "N818"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["N802", "N803", "N806"]

[tool.mypy]
# Match runtime (Dockerfile 3.11); `X | Y` unions need 3.10+ for mypy
python_version = "3.11"
warn_return_any = false
warn_unused_configs = true
ignore_missing_imports = true
explicit_package_bases = true
namespace_packages = true
# Gradual typing: large legacy surface; CI still runs mypy to catch regressions
disable_error_code = [
    "no-untyped-def",
    "type-arg",
    "valid-type",
    "union-attr",
    "attr-defined",
    "arg-type",
    "call-arg",
    "assignment",
    "return-value",
    "var-annotated",
    "index",
    "operator",
    "misc",
    "import-untyped",
    "dict-item",
    "type-var",
]
exclude = [
    "database/migrations/",
    "venv/",
    ".venv/",
    "build/",
    "dist/",
    "node_modules/",
    "frontend/node_modules/",
    "streamlit_app/",
    "scripts/",
    "tests/",
]
