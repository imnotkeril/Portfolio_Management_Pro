services:
  postgres:
    image: postgres:16-alpine
    container_name: wmc-postgres
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: wmc-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://portfolio:portfolio@postgres:5432/portfolio
      FRONTEND_URL: http://localhost:3000
      CACHE_DIR: data/cache
      LOG_LEVEL: INFO
      # Stripe: values interpolated from host .env (do not use env_file — it can override DATABASE_URL)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID_PRO: ${STRIPE_PRICE_ID_PRO:-}
      BILLING_ENFORCEMENT: ${BILLING_ENFORCEMENT:-true}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Must match host port mapping for api — browser runs on your machine, not inside Docker network
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: wmc-web
    environment:
      API_INTERNAL_URL: http://api:8000
      COOKIE_SECURE: "false"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
